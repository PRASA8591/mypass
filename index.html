<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Secure Pass Vault</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:20px;
}

.container{
max-width:450px;
width:100%;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

.pass{
background:#020617;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div id="login" class="card">

<h2>🔐 Pass Vault</h2>

<input type="password" id="master" placeholder="Master Password">

<button onclick="login()">Unlock with Password</button>

<button onclick="biometricLogin()">Unlock with Biometrics</button>

</div>


<div id="vault" style="display:none">

<button onclick="showAdd()">Add Password</button>
<button onclick="logout()">Lock</button>

<div id="list"></div>

</div>


<div id="add" class="card" style="display:none">

<h3>Add Password</h3>

<input id="site" placeholder="Site">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="save()">Save</button>
<button onclick="cancel()">Cancel</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCTMFecKL6ab82UC_sfhEVPK8CPe6ZnFEI",
authDomain:"my-password-92eb6.firebaseapp.com",
projectId:"my-password-92eb6",
storageBucket:"my-password-92eb6.firebasestorage.app",
messagingSenderId:"784477596349",
appId:"1:784477596349:web:5017c577de3d35f7ab25d4",
measurementId:"G-ZGNM4LZVGM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let key;

/* ---------- HASH PASSWORD ---------- */

async function hash(text){

const buf = await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(text)
);

return btoa(String.fromCharCode(...new Uint8Array(buf)));

}

/* ---------- KEY DERIVATION ---------- */

async function deriveKey(password){

const enc=new TextEncoder();

const material=await crypto.subtle.importKey(
"raw",
enc.encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:new Uint8Array([1,2,3,4,5]),
iterations:100000,
hash:"SHA-256"
},
material,
{name:"AES-GCM",length:256},
false,
["encrypt","decrypt"]
);

}

/* ---------- ENCRYPT ---------- */

async function encrypt(text){

const iv=crypto.getRandomValues(new Uint8Array(12));

const enc=new TextEncoder().encode(text);

const cipher=await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
key,
enc
);

return JSON.stringify({
iv:Array.from(iv),
data:Array.from(new Uint8Array(cipher))
});

}

/* ---------- DECRYPT ---------- */

async function decrypt(obj){

const data=JSON.parse(obj);

const iv=new Uint8Array(data.iv);
const buf=new Uint8Array(data.data);

const dec=await crypto.subtle.decrypt(
{name:"AES-GCM",iv},
key,
buf
);

return new TextDecoder().decode(dec);

}

/* ---------- LOGIN ---------- */

window.login = async function(){

const password=document.getElementById("master").value;

const hashPass=await hash(password);

const ref=doc(db,"users","vaultUser");

const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{
masterHash:hashPass
});

key=await deriveKey(password);

openVault();

return;

}

const savedHash=snap.data().masterHash;

if(savedHash!==hashPass){

alert("Wrong password");
return;

}

key=await deriveKey(password);

openVault();

}

/* ---------- BIOMETRIC ---------- */

window.biometricLogin = async function(){

if(!window.PublicKeyCredential){
alert("Biometric not supported");
return;
}

try{

const challenge=new Uint8Array(32);
crypto.getRandomValues(challenge);

await navigator.credentials.get({
publicKey:{
challenge,
timeout:60000,
userVerification:"required"
}
});

openVault();

}catch(e){

alert("Biometric cancelled");

}

}

/* ---------- OPEN VAULT ---------- */

async function openVault(){

document.getElementById("login").style.display="none";
document.getElementById("vault").style.display="block";

load();

}

/* ---------- LOAD PASSWORDS ---------- */

async function load(){

const q=await getDocs(collection(db,"users/vaultUser/passwords"));

let html="";

for(const d of q.docs){

const data=d.data();

const site=await decrypt(data.site);
const user=await decrypt(data.user);
const pass=await decrypt(data.pass);

html+=`
<div class="pass">
<b>${site}</b><br>
${user}<br>
${pass}
</div>
`;

}

document.getElementById("list").innerHTML=html;

}

/* ---------- SAVE PASSWORD ---------- */

window.save = async function(){

const site=document.getElementById("site").value;
const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

await addDoc(collection(db,"users/vaultUser/passwords"),{

site:await encrypt(site),
user:await encrypt(user),
pass:await encrypt(pass)

});

cancel();
load();

}

/* ---------- UI ---------- */

window.showAdd=function(){

document.getElementById("vault").style.display="none";
document.getElementById("add").style.display="block";

}

window.cancel=function(){

document.getElementById("add").style.display="none";
document.getElementById("vault").style.display="block";

}

window.logout=function(){

location.reload();

}

</script>

</body>
</html>
