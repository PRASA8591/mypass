<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Password Vault</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:20px;
}

.container{
max-width:450px;
width:100%;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

.pass{
background:#020617;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div id="login" class="card">

<h2>🔐 Pass Vault</h2>

<input type="password" id="master" placeholder="Master Password">

<button id="loginBtn">Unlock with Password</button>

<button id="bioBtn">Unlock with Biometrics</button>

</div>

<div id="vault" style="display:none">

<button id="addBtn">Add Password</button>
<button id="lockBtn">Lock</button>

<div id="list"></div>

</div>

<div id="add" class="card" style="display:none">

<h3>Add Password</h3>

<input id="site" placeholder="Site">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button id="saveBtn">Create</button>
<button id="cancelBtn">Cancel</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCTMFecKL6ab82UC_sfhEVPK8CPe6ZnFEI",
authDomain: "my-password-92eb6.firebaseapp.com",
projectId: "my-password-92eb6",
storageBucket: "my-password-92eb6.firebasestorage.app",
messagingSenderId: "784477596349",
appId: "1:784477596349:web:5017c577de3d35f7ab25d4",
measurementId: "G-ZGNM4LZVGM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let key = null;

/* HASH */

async function hash(text){

const buf = await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(text)
);

return btoa(String.fromCharCode(...new Uint8Array(buf)));

}

/* KEY */

async function deriveKey(password){

const enc = new TextEncoder();

const material = await crypto.subtle.importKey(
"raw",
enc.encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:new Uint8Array([1,2,3,4,5]),
iterations:100000,
hash:"SHA-256"
},
material,
{name:"AES-GCM",length:256},
false,
["encrypt","decrypt"]
);

}

/* ENCRYPT */

async function encrypt(text){

if(!key) throw "Key not ready";

const iv = crypto.getRandomValues(new Uint8Array(12));

const encoded = new TextEncoder().encode(text);

const cipher = await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
key,
encoded
);

return JSON.stringify({
iv:Array.from(iv),
data:Array.from(new Uint8Array(cipher))
});

}

/* DECRYPT */

async function decrypt(obj){

if(!key) throw "Key not ready";

const data = JSON.parse(obj);

const iv = new Uint8Array(data.iv);
const buf = new Uint8Array(data.data);

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv},
key,
buf
);

return new TextDecoder().decode(decrypted);

}

/* LOGIN */

async function login(){

const password=document.getElementById("master").value;

if(!password){
alert("Enter password");
return;
}

const hashPass=await hash(password);

const ref=doc(db,"users","vaultUser");

const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{masterHash:hashPass});

key=await deriveKey(password);

openVault();

return;

}

const savedHash=snap.data().masterHash;

if(savedHash!==hashPass){

alert("Wrong password");
return;

}

key=await deriveKey(password);

openVault();

}

/* BIOMETRIC */

async function biometricLogin(){

if(!window.PublicKeyCredential){
alert("Biometric not supported");
return;
}

try{

const challenge=new Uint8Array(32);
crypto.getRandomValues(challenge);

await navigator.credentials.get({
publicKey:{
challenge,
timeout:60000,
userVerification:"required"
}
});

openVault();

}catch(e){

alert("Biometric cancelled");

}

}

/* OPEN */

function openVault(){

document.getElementById("login").style.display="none";
document.getElementById("vault").style.display="block";

loadPasswords();

}

/* LOAD PASSWORDS */

async function loadPasswords(){

const list=document.getElementById("list");

list.innerHTML="Loading...";

const query=await getDocs(collection(db,"users","vaultUser","passwords"));

let html="";

for(const d of query.docs){

const data=d.data();

const site=await decrypt(data.site);
const user=await decrypt(data.user);
const pass=await decrypt(data.pass);

html+=`
<div class="pass">
<b>${site}</b><br>
${user}<br>
${pass}
</div>
`;

}

list.innerHTML=html;

}

/* SAVE */

async function savePassword(){

try{

const site=document.getElementById("site").value;
const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

if(!site||!user||!pass){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"users","vaultUser","passwords"),{

site:await encrypt(site),
user:await encrypt(user),
pass:await encrypt(pass)

});

cancelAdd();

loadPasswords();

}catch(err){

alert("Save failed");
console.error(err);

}

}

/* UI */

function showAdd(){

document.getElementById("vault").style.display="none";
document.getElementById("add").style.display="block";

}

function cancelAdd(){

document.getElementById("add").style.display="none";
document.getElementById("vault").style.display="block";

}

function lock(){

location.reload();

}

/* BUTTON EVENTS */

document.getElementById("loginBtn").onclick=login;
document.getElementById("bioBtn").onclick=biometricLogin;
document.getElementById("addBtn").onclick=showAdd;
document.getElementById("saveBtn").onclick=savePassword;
document.getElementById("cancelBtn").onclick=cancelAdd;
document.getElementById("lockBtn").onclick=lock;

</script>

</body>
</html>
