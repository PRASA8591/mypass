<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Secure Pass Vault</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:20px;
}

.container{
max-width:500px;
width:100%;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.smallbtn{
width:auto;
padding:5px 10px;
margin-right:5px;
}

.pass{
background:#020617;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.actions{
margin-top:5px;
}

.search{
margin-bottom:15px;
}

/* popup */

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 20px;
border-radius:6px;
display:none;
z-index:1000;
}

</style>
</head>

<body>

<div id="popup"></div>

<div class="container">

<div id="login" class="card">

<h2>🔐 Pass Vault</h2>

<input type="password" id="master" placeholder="Master Password">

<button id="loginBtn">Unlock</button>
<button id="bioBtn">Biometric Login</button>

</div>

<div id="vault" style="display:none">

<input id="search" class="search" placeholder="Search site / username / password">

<button id="addBtn">Add Password</button>
<button id="lockBtn">Lock</button>

<div id="list"></div>

</div>

<div id="add" class="card" style="display:none">

<h3 id="formTitle">Add Password</h3>

<input id="site" placeholder="Site">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button id="saveBtn">Save</button>
<button id="cancelBtn">Cancel</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCTMFecKL6ab82UC_sfhEVPK8CPe6ZnFEI",
authDomain:"my-password-92eb6.firebaseapp.com",
projectId:"my-password-92eb6",
storageBucket:"my-password-92eb6.firebasestorage.app",
messagingSenderId:"784477596349",
appId:"1:784477596349:web:5017c577de3d35f7ab25d4"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let key=null;
let editId=null;

/* popup */

function popup(msg,color="#22c55e"){
const p=document.getElementById("popup");
p.innerText=msg;
p.style.background=color;
p.style.display="block";

setTimeout(()=>{
p.style.display="none";
},2000);
}

/* hash */

async function hash(text){
const buf=await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(text)
);
return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

/* key */

async function deriveKey(password){

const material=await crypto.subtle.importKey(
"raw",
new TextEncoder().encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:new Uint8Array([1,2,3,4,5]),
iterations:100000,
hash:"SHA-256"
},
material,
{name:"AES-GCM",length:256},
false,
["encrypt","decrypt"]
);

}

/* encrypt */

async function encrypt(text){

const iv=crypto.getRandomValues(new Uint8Array(12));

const cipher=await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
key,
new TextEncoder().encode(text)
);

return JSON.stringify({
iv:Array.from(iv),
data:Array.from(new Uint8Array(cipher))
});

}

/* decrypt */

async function decrypt(data){

const obj=JSON.parse(data);

const decrypted=await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(obj.iv)},
key,
new Uint8Array(obj.data)
);

return new TextDecoder().decode(decrypted);

}

/* login */

async function login(){

const password=document.getElementById("master").value;

const hashPass=await hash(password);

const ref=doc(db,"users","vaultUser");
const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{masterHash:hashPass});

key=await deriveKey(password);

popup("Vault Created");

openVault();

return;

}

if(hashPass!==snap.data().masterHash){

popup("Wrong Password","#ef4444");
return;

}

key=await deriveKey(password);

popup("Login Success");

openVault();

}

/* biometric */

async function biometricLogin(){

try{

await navigator.credentials.get({
publicKey:{
challenge:new Uint8Array(32),
timeout:60000,
userVerification:"required"
}
});

popup("Biometric Success");

openVault();

}catch{

popup("Biometric Failed","#ef4444");

}

}

/* open */

function openVault(){

document.getElementById("login").style.display="none";
document.getElementById("vault").style.display="block";

loadPasswords();

}

/* load */

async function loadPasswords(){

const list=document.getElementById("list");
list.innerHTML="Loading...";

const snap=await getDocs(collection(db,"users","vaultUser","passwords"));

let html="";

for(const d of snap.docs){

const data=d.data();

const site=await decrypt(data.site);
const user=await decrypt(data.user);
const pass=await decrypt(data.pass);

html+=`
<div class="pass">

<b>${site}</b><br>
${user}<br>
${pass}

<div class="actions">

<button class="smallbtn" onclick="editPassword('${d.id}','${site}','${user}','${pass}')">Edit</button>

<button class="smallbtn" onclick="deletePassword('${d.id}')">Delete</button>

</div>

</div>
`;

}

list.innerHTML=html;

}

/* save */

async function savePassword(){

const site=document.getElementById("site").value;
const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

if(!site||!user||!pass){
popup("Fill all fields","#ef4444");
return;
}

if(editId){

await updateDoc(doc(db,"users","vaultUser","passwords",editId),{

site:await encrypt(site),
user:await encrypt(user),
pass:await encrypt(pass)

});

popup("Password Updated");

}else{

await addDoc(collection(db,"users","vaultUser","passwords"),{

site:await encrypt(site),
user:await encrypt(user),
pass:await encrypt(pass)

});

popup("Password Added");

}

cancelAdd();
loadPasswords();

}

/* edit */

window.editPassword=(id,site,user,pass)=>{

editId=id;

document.getElementById("site").value=site;
document.getElementById("user").value=user;
document.getElementById("pass").value=pass;

document.getElementById("formTitle").innerText="Edit Password";

showAdd();

}

/* delete */

window.deletePassword=async(id)=>{

await deleteDoc(doc(db,"users","vaultUser","passwords",id));

popup("Password Deleted","#ef4444");

loadPasswords();

}

/* search */

document.getElementById("search").addEventListener("input",function(){

const val=this.value.toLowerCase();

const items=document.querySelectorAll(".pass");

items.forEach(i=>{

if(i.innerText.toLowerCase().includes(val))
i.style.display="block";
else
i.style.display="none";

});

});

/* ui */

function showAdd(){
document.getElementById("vault").style.display="none";
document.getElementById("add").style.display="block";
}

function cancelAdd(){

editId=null;

document.getElementById("site").value="";
document.getElementById("user").value="";
document.getElementById("pass").value="";

document.getElementById("formTitle").innerText="Add Password";

document.getElementById("add").style.display="none";
document.getElementById("vault").style.display="block";

}

function lock(){
location.reload();
}

/* buttons */

loginBtn.onclick=login;
bioBtn.onclick=biometricLogin;
addBtn.onclick=showAdd;
saveBtn.onclick=savePassword;
cancelBtn.onclick=cancelAdd;
lockBtn.onclick=lock;

</script>

</body>
</html>
